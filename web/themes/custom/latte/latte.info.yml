name: latte
type: theme
'base theme': stable9
starterkit: true
version: VERSION
libraries:
  - latte/base
  - latte/messages
  - core/normalize
libraries-extend:
  user/drupal.user:
    - latte/user
  core/drupal.dropbutton:
    - latte/dropbutton
  core/drupal.dialog:
    - latte/dialog
  file/drupal.file:
    - latte/file
  core/drupal.progress:
    - latte/progress
core_version_requirement: ^10
generator: 'starterkit_theme:10.1.1'
regions:
  sitelogo: 'Site logo'
  navigation: 'Navigation'
  banner: 'Banner'
  breadcrumb: 'Breadcrumb'
  content: 'Content'
  introduction: 'Introduction'
  about_me: 'About Me'
  blog: 'Blogs'
  testimonials: 'Testimonials'
  showcase: 'Showcase'
  mywork: 'My Work'
  clients: 'Clients List'
  contact: 'Contact'
  map: 'Map'
  social_share: 'Social Share'
  copy_right: 'Copy Right'
  disabled: 'Disabled'  

